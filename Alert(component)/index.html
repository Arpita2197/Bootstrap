<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert</title>

      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />

     <link rel="stylesheet" href="style.css" />

</head>
<body>
                           
     <h1>ALERT</h1>       <!-- alert => light , bg => dark -->
     <div class="alert alert-primary">Download failed!!</div>
     <div class="alert bg-danger">Download failed!!</div>

      <div class="alert alert-info alert-dismissible" >
        CONGRULATIONS!!!!!
        <button class="btn-close" data-bs-dismiss="alert"></button>      <!--  data-bs-dismiss="alert" for js -->
      </div>

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
