<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTTONS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />

     <link rel="stylesheet" href="style.css" />
</head>
<body>

     <button class="btn btn-primary">primary</button>
     <button class="btn btn-secondary">secondary</button>
     <button class="btn btn-success">success</button>
     <button class="btn btn-danger">danger</button>
      <button class="btn btn-warning">warning</button>
      <button class="btn btn-info">info</button>
      <button class="btn btn-dark">dark</button> 
      <button class="btn btn-light">light</button>
        
      <hr>

       <h3>outline buttons</h3>

      <button class="btn btn-outline-primary">primary</button>
     <button class="btn btn-outline-secondary">secondary</button>
     <button class="btn btn-outline-success">success</button>

      <hr>

       <h3>sizes</h3>

        <button class="btn btn-outline-warning btn-lg">warning</button>
      <button class="btn btn-info btn-sm">info</button>

      <hr>

      <h3>DISABLED</h3>
        <button class="btn btn-outline-warning btn-lg " disabled>warning</button>

        <hr>

        <h3>ANCHOR TAG IN BUTTON FORM</h3>
      <a href="#" class="btn btn-outline-dark">google me!</a>


      
     
        


    
</body>
</html>
