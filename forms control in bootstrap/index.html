<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMS CONTROL IN BOOTSTRAP</title>

    
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />

      <link rel="stylesheet" href="style.css" />

  </head>
<body>
    
     <div class= "container-fluid">
        <h5>FORM DEMO</h5>

        <form class="mb-3">           <!-- mb-3 ==> default margin-->
            <label class="form-label" for="email"> Email</label>
            <input type="text" class="form-control" placeholder="Email" id="email"/>

             <label class="form-label" for="pass"> Password</label>
            <input type="password" class="form-control" placeholder="Password" id="pass"/>

              <label class="form-label" for="address"> Address</label>
            <input type="text" class="form-control-lg" placeholder="address" id="address"/>

            <hr>

            <h1>DROPDOWN IN FORMS</h1>
            <div class="mb-3">
                <select class="form-select">
                    <option>choose any</option>
                    <option>one</option>
                    <option>two</option> 
                    <option>three</option>

                </select>
            </div>


             <h1>Checkbox</h1>
               
              <!-- by html only-->
             <div class="normal">
       
                <input type="checkbox" id="check"/>
                <label  for="check">Agree</label>
             </div>

              <div class="form-check">
                 
                <input type="checkbox" id="checkbs"  class="form-check-input"/>
                <label for="checkbs" class="form-check-label">Select</label>

              </div>

                <h1>Radio</h1>

                  <div class="form-check">
                 
                <input type="radio" id="radiobs"  class="form-check-input"/>
                <label for="radiobs" class="form-check-label">Yes/No</label>

              </div>


              <h1>Switches/ different form of checkbox</h1>

              
                  <div class="form-check form-switch">
                 
                <input type="checkbox" id="switch"  class="form-check-input"/>
                <label for="switch" class="form-check-label">percentage</label>

              </div>

        </form>

     </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
