<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BADGE</title>
<!-- 
     BADGES = how many messages.. -->

      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />

     <link rel="stylesheet" href="style.css" />
</head>
<body>
    
        <h1>BADGES</h1>

         <span class="badge bg-primary">new</span>
         <span class="badge bg-info">10+</span>
          
         <hr>

         <h3>Notifications <span class="badge bg-dark">10+</span></h3>
           <h3>Notifications <span class="badge bg-success">click!</span></h3>

           <hr>

           <!-- BUTTONS KA ANDAR BADGES BANA SAKTA -->
         <h2>BUTTONS</h2>  

         <button class="btn btn-primary">clickkkk!!! <span class="badge bg-danger">new</span> </button>
         <button class="btn btn-primary">FOLLOWERS <span class="badge bg-dark">100+</span></button>

         <hr>

         <h3>PILL SHAPED</h3>
               
         <button class="btn  btn-primary">folllow  <span class="badge bg-danger rounded-pill">10+</span></button>

         <hr>

         <h3>POSITIONED</h3>
                                   <!-- relative positio must ha agar badge uppar shift karna ha toh -->
         <button class="btn btn-primary position-relative" >       
            index  
              <span class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill"> 
                 99+</span>    <!--- position relative sa badge uppar gaya -->
            </button>  

            <hr>
            
            <button class="btn btn-primary position-relative">
                danger
                 <span class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill">
                    100+</span>
                </button>

</body>
</html>
